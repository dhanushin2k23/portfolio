services:
  - type: web
    name: dhanush-stats-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn stats_api:app
    envVars:
      - key: GITHUB_TOKEN
        sync: false   # You set this manually in Render dashboard
      - key: WEB3FORMS_ACCESS_KEY
        sync: false   # From https://web3forms.com — delivers form mail to your inbox
      - key: CONTACT_EMAIL
        value: dhanushin2k23@gmail.com
